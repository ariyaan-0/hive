# ── Hive · Development Docker Compose ──
# Usage: docker compose -f docker-compose.dev.yml up --build

services:
  db:
    image: postgres:17-alpine
    container_name: hive-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: hive_user
      POSTGRES_PASSWORD: hive_pass
      POSTGRES_DB: hive
    ports:
      - "5433:5432"
    volumes:
      - hive_pg_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive_user -d hive"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./hive-backend
      dockerfile: Dockerfile.dev
    container_name: hive-backend-dev
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Mount source code for hot-reload
      - ./hive-backend:/app
      # Prevent host .venv from leaking into container
      - /app/.venv
      - /app/__pycache__
    env_file:
      - ./hive-backend/.env
    environment:
      # Override DB URL to point to the Docker Postgres container
      URL_DATABASE: "postgresql://hive_user:hive_pass@db:5432/hive"
    depends_on:
      db:
        condition: service_healthy

volumes:
  hive_pg_data_dev:
