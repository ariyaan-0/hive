# ── Hive CI/CD Pipeline ──
# Triggers on push to main → builds → deploys to DigitalOcean Droplet

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────
  # JOB 1: CI — Build & Validate
  # ─────────────────────────────────────
  ci:
    name: Build & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Backend: verify Docker image builds ──
      - name: Build backend Docker image
        run: |
          docker build \
            -f hive-backend/Dockerfile.prod \
            -t hive-backend:${{ github.sha }} \
            ./hive-backend

      # ── Frontend: verify it builds ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: hive-frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: hive-frontend
        run: npm ci

      - name: Build frontend
        working-directory: hive-frontend
        run: npm run build

      # ── Future: Add test steps here ──
      # - name: Run backend tests
      #   run: docker run hive-backend:${{ github.sha }} pytest
      #
      # - name: Run frontend tests
      #   working-directory: hive-frontend
      #   run: npm test

  # ─────────────────────────────────────
  # JOB 2: CD — Deploy to DigitalOcean
  # Runs ONLY on push to main (not on PRs)
  # ─────────────────────────────────────
  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: ${{ secrets.DO_PORT || 22 }}
          script: |
            cd ~/hive

            # Pull latest code
            git pull origin main

            # Rebuild and restart containers (detached)
            docker compose -f docker-compose.prod.yml up --build -d

            # Run database migrations
            docker compose -f docker-compose.prod.yml exec -T backend alembic upgrade head

            # Clean up old Docker images
            docker image prune -f
